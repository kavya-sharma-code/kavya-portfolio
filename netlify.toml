[build]
  command = "npm run build"
  # Netlify will serve the Next.js build output.
  # For Next.js SSR/server, this is handled by Netlify’s Next.js integration.
  # Keep this value as .next to match the framework output.
  publish = ".next"

# Ensure all routes fall back to Next’s home so deep links don’t 404.
[[redirects]]
  from = "/*"
  to = "/"
  status = 200

[dev]
  command = "npm run dev"
  framework = "nextjs"

